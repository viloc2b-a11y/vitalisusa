<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | VITALIS Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body style="background: var(--azul-suave); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    
    <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: var(--sombra-lg); width: 100%; max-width: 400px; text-align: center;">
        <a href="index.html" class="brand" style="justify-content: center; margin-bottom: 30px;"><span class="brand-v">V</span>ITALIS</a>
        <h2>Bienvenido de nuevo</h2>
        <p style="margin-bottom: 30px; font-size: 0.9rem;">Accede a tu portal para ver tus estudios y comunidad.</p>
        
        <form onsubmit="event.preventDefault(); window.location.href='dashboard-paciente.html';">
            <div class="form-group" style="text-align: left;">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-input" placeholder="tu@email.com" required>
            </div>
            <div class="form-group" style="text-align: left;">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-grande" style="margin-top: 20px;">Iniciar sesión</button>
        </form>

        <p style="margin-top: 30px; font-size: 0.85rem; color: var(--texto-light);">
            ¿Eres investigador? <a href="dashboard-investigador.html" style="color: var(--azul-medio); font-weight: 600;">Acceso investigador</a>
        </p>
    </div>

</body>
</html>
